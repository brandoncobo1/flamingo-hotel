<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin — Flamingo Hotel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark:   #0A0A0A;
            --gold:   #F78FAD;
            --gold2:  #6B6B2E;
            --gold-bg:#F5EDD5;
            --white:  #FAFAF7;
            --bg:     #F4F1EB;
            --muted:  #8C8880;
            --border: #DDD9D0;
            --red:    #C0392B;
            --red-bg: #FDECEA;
            --font-d: 'Cormorant Garamond', serif;
            --font-s: 'Inter', sans-serif;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size:16px; }
        body { background:var(--bg); font-family:var(--font-s); color:var(--dark); -webkit-font-smoothing:antialiased; min-height:100vh; }

        /* ── LOGIN SCREEN ─────────────────────────── */
        #loginScreen {
            position:fixed; inset:0; background:var(--dark);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:999; padding:32px;
        }
        #loginScreen.hidden { display:none; }
        .login-logo {
            font-family:var(--font-d); font-size:13px; letter-spacing:0.22em;
            text-transform:uppercase; color:var(--gold2); font-style:italic;
            margin-bottom:48px; text-align:center;
        }
        .login-title {
            font-family:var(--font-d); font-size:36px; font-style:italic;
            color:var(--white); font-weight:300; margin-bottom:8px; text-align:center;
        }
        .login-sub {
            font-size:12px; color:var(--muted); letter-spacing:0.06em;
            margin-bottom:40px; text-align:center;
        }
        .pin-dots {
            display:flex; gap:14px; margin-bottom:36px; justify-content:center;
        }
        .pin-dot {
            width:14px; height:14px; border-radius:50%;
            border:1.5px solid rgba(184,151,62,0.4);
            background:transparent; transition:background 0.15s, border-color 0.15s;
        }
        .pin-dot.filled { background:var(--gold); border-color:var(--gold); }
        .numpad {
            display:grid; grid-template-columns:repeat(3,72px); gap:14px;
            justify-content:center;
        }
        .num-btn {
            width:72px; height:72px; border-radius:50%;
            border:1px solid rgba(255,255,255,0.12);
            background:rgba(255,255,255,0.04);
            color:var(--white); font-family:var(--font-s); font-size:20px; font-weight:300;
            cursor:pointer; transition:background 0.15s, border-color 0.15s;
            display:flex; align-items:center; justify-content:center;
        }
        .num-btn:hover { background:rgba(184,151,62,0.15); border-color:var(--gold); }
        .num-btn:active { background:rgba(184,151,62,0.3); }
        .num-btn.empty { border:none; background:none; cursor:default; }
        .num-btn.del { font-size:18px; color:var(--muted); }
        .login-error {
            margin-top:24px; font-size:12px; color:var(--red);
            letter-spacing:0.08em; text-align:center; min-height:18px;
            transition:opacity 0.3s;
        }

        /* ── MAIN LAYOUT ──────────────────────────── */
        #mainApp { display:none; }
        #mainApp.show { display:block; }

        .topbar {
            position:sticky; top:0; z-index:100;
            background:var(--dark); padding:0 28px;
            display:flex; align-items:center; justify-content:space-between;
            height:60px; border-bottom:2px solid var(--gold);
        }
        .topbar-brand {
            font-family:var(--font-d); font-size:13px; letter-spacing:0.2em;
            text-transform:uppercase; color:var(--gold2); font-style:italic;
        }
        .topbar-right { display:flex; align-items:center; gap:20px; }
        .topbar-label {
            font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
            color:var(--muted);
        }
        .logout-btn {
            background:none; border:1px solid rgba(255,255,255,0.15);
            color:var(--muted); font-size:11px; letter-spacing:0.1em;
            text-transform:uppercase; padding:7px 16px; cursor:pointer;
            font-family:var(--font-s); transition:border-color 0.2s, color 0.2s;
        }
        .logout-btn:hover { border-color:var(--gold); color:var(--gold2); }

        /* ── MONTH NAV ────────────────────────────── */
        .month-nav {
            display:flex; align-items:center; justify-content:center;
            gap:24px; padding:28px 28px 8px;
        }
        .mnav-btn {
            background:none; border:1px solid var(--border); width:40px; height:40px;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:18px; color:var(--dark);
            transition:border-color 0.2s, background 0.2s;
        }
        .mnav-btn:hover { border-color:var(--gold); background:var(--white); }
        .mnav-label {
            font-family:var(--font-d); font-size:28px; font-style:italic;
            font-weight:400; min-width:240px; text-align:center;
        }

        /* ── STATS BAR ────────────────────────────── */
        .stats-bar {
            display:flex; gap:12px; padding:0 28px 20px; flex-wrap:wrap;
        }
        .stat-chip {
            display:flex; align-items:center; gap:8px;
            background:var(--white); border:1px solid var(--border);
            padding:10px 16px; font-size:12px;
        }
        .stat-dot { width:10px; height:10px; border-radius:50%; }
        .stat-num { font-weight:600; font-size:14px; }

        /* ── ROOMS GRID ───────────────────────────── */
        .rooms-grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap:20px; padding:0 28px 40px;
        }

        .room-panel {
            background:var(--white); border:1px solid var(--border);
            overflow:hidden;
        }
        .room-panel-header {
            padding:18px 20px; border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between;
            background:var(--dark);
        }
        .room-panel-name {
            font-family:var(--font-d); font-size:18px; font-style:italic;
            font-weight:400; color:var(--white);
        }
        .room-panel-badge {
            font-size:9px; letter-spacing:0.18em; text-transform:uppercase;
            color:var(--gold); font-weight:500;
        }
        .room-blocked-count {
            font-size:11px; color:var(--muted); margin-top:3px;
        }

        /* ── CALENDAR ─────────────────────────────── */
        .cal-wrap { padding:16px 16px 20px; }
        .cal-weekdays {
            display:grid; grid-template-columns:repeat(7,1fr);
            margin-bottom:6px;
        }
        .cal-wd {
            text-align:center; font-size:9px; letter-spacing:0.1em;
            text-transform:uppercase; color:var(--muted); padding:4px 0;
        }
        .cal-days-grid {
            display:grid; grid-template-columns:repeat(7,1fr); gap:3px;
        }
        .cal-cell {
            aspect-ratio:1; display:flex; align-items:center; justify-content:center;
            cursor:pointer; position:relative; border-radius:2px;
            transition:background 0.12s;
        }
        .cal-cell.empty { cursor:default; }
        .cal-cell.past { cursor:default; }
        .cal-num {
            font-size:13px; font-weight:300; font-family:var(--font-s);
            color:var(--dark); line-height:1; z-index:1; position:relative;
            width:100%; height:100%; display:flex; align-items:center; justify-content:center;
            border-radius:2px; transition:background 0.12s, color 0.12s;
        }
        .cal-cell.past .cal-num { color:#D0CCC4; }
        .cal-cell.today:not(.blocked) .cal-num::after {
            content:''; position:absolute; bottom:3px; left:50%; transform:translateX(-50%);
            width:3px; height:3px; border-radius:50%; background:var(--gold);
        }
        .cal-cell:not(.past):not(.empty):not(.blocked):hover .cal-num {
            background:var(--gold-bg);
        }
        .cal-cell.blocked .cal-num {
            background:var(--red); color:#fff; font-weight:500;
        }
        .cal-cell.blocked:hover .cal-num {
            background:#a93226;
        }

        /* ── ACTIONS ──────────────────────────────── */
        .room-actions {
            padding:12px 16px 16px; border-top:1px solid var(--border);
            display:flex; gap:8px; flex-wrap:wrap;
        }
        .action-btn {
            flex:1; min-width:120px; padding:10px 12px;
            font-family:var(--font-s); font-size:11px; letter-spacing:0.1em;
            text-transform:uppercase; cursor:pointer; font-weight:500;
            transition:background 0.2s, color 0.2s, border-color 0.2s;
            border:1px solid var(--border); background:none; color:var(--muted);
        }
        .action-btn:hover { border-color:var(--dark); color:var(--dark); background:var(--bg); }
        .action-btn.danger { color:var(--red); border-color:rgba(192,57,43,0.3); }
        .action-btn.danger:hover { background:var(--red-bg); border-color:var(--red); }

        /* ── TOAST ────────────────────────────────── */
        .toast {
            position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px);
            background:var(--dark); color:var(--gold2);
            font-family:var(--font-d); font-size:15px; font-style:italic;
            padding:14px 28px; letter-spacing:0.06em;
            transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
            opacity:0; z-index:9999; white-space:nowrap; pointer-events:none;
            border-bottom:2px solid var(--gold);
        }
        .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

        /* ── LEGEND ───────────────────────────────── */
        .legend {
            display:flex; gap:20px; padding:0 28px 20px; flex-wrap:wrap;
        }
        .leg-item { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); letter-spacing:0.06em; }
        .leg-sq { width:14px; height:14px; border-radius:2px; }

        /* ── RESPONSIVE ───────────────────────────── */
        @media(max-width:600px){
            .rooms-grid { grid-template-columns:1fr; padding:0 16px 40px; }
            .topbar { padding:0 16px; }
            .month-nav { padding:20px 16px 6px; }
            .stats-bar { padding:0 16px 16px; }
            .legend { padding:0 16px 16px; }
            .mnav-label { font-size:22px; min-width:180px; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-logo">Flamingo Hotel — Vlorë</div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">Enter your PIN to continue</p>
    <div class="pin-dots" id="pinDots">
        <div class="pin-dot" id="dot0"></div>
        <div class="pin-dot" id="dot1"></div>
        <div class="pin-dot" id="dot2"></div>
        <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="numpad">
        <button class="num-btn" onclick="enterPin('1')">1</button>
        <button class="num-btn" onclick="enterPin('2')">2</button>
        <button class="num-btn" onclick="enterPin('3')">3</button>
        <button class="num-btn" onclick="enterPin('4')">4</button>
        <button class="num-btn" onclick="enterPin('5')">5</button>
        <button class="num-btn" onclick="enterPin('6')">6</button>
        <button class="num-btn" onclick="enterPin('7')">7</button>
        <button class="num-btn" onclick="enterPin('8')">8</button>
        <button class="num-btn" onclick="enterPin('9')">9</button>
        <button class="num-btn empty"></button>
        <button class="num-btn" onclick="enterPin('0')">0</button>
        <button class="num-btn del" onclick="delPin()">⌫</button>
    </div>
    <div class="login-error" id="loginError"></div>
</div>

<!-- MAIN APP -->
<div id="mainApp">

    <div class="topbar">
        <div class="topbar-brand">Chic — Availability Manager</div>
        <div class="topbar-right">
            <span class="topbar-label" id="lastSaved"></span>
            <button class="logout-btn" onclick="logout()">Lock</button>
        </div>
    </div>

    <div class="month-nav">
        <button class="mnav-btn" onclick="changeMonth(-1)">&#8592;</button>
        <div class="mnav-label" id="monthLabel"></div>
        <button class="mnav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>

    <div class="legend">
        <div class="leg-item"><div class="leg-sq" style="background:var(--white);border:1px solid var(--border);"></div>Available</div>
        <div class="leg-item"><div class="leg-sq" style="background:var(--red);"></div>Blocked / Occupied</div>
        <div class="leg-item"><div class="leg-sq" style="background:var(--gold);border-radius:50%;width:10px;height:10px;margin-right:4px;"></div>Today</div>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="rooms-grid" id="roomsGrid"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────
const PIN = '1234'; // Change this to whatever PIN you want
const STORAGE_KEY = 'chic_blocked';

const ROOMS_CONFIG = [
    { id:'deluxe-double',  name:'Deluxe Double Room',  label:'Deluxe',   maxGuests:2, price:59  },
    { id:'deluxe-triple',  name:'Deluxe Triple Room',   label:'Deluxe',   maxGuests:3, price:79  },
    { id:'economy-twin',   name:'Economy Twin Room',    label:'Standard', maxGuests:2, price:49  },
    { id:'book-direct',    name:'Direct Booking',       label:'Enquire',  maxGuests:6, price:0   }
];

const WEEKDAYS = ['Mo','Tu','We','Th','Fr','Sa','Su'];
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── STATE ──────────────────────────────────────────
let pinEntry   = '';
let blocked    = {}; // { roomId: ['2025-06-15', ...] }
let viewYear, viewMonth;
let authenticated = false;

// ── PIN ────────────────────────────────────────────
function enterPin(digit) {
    if (pinEntry.length >= 4) return;
    pinEntry += digit;
    updateDots();
    if (pinEntry.length === 4) {
        setTimeout(() => {
            if (pinEntry === PIN) {
                unlockApp();
            } else {
                document.getElementById('loginError').textContent = 'Incorrect PIN. Try again.';
                pinEntry = '';
                setTimeout(() => updateDots(), 100);
                setTimeout(() => {
                    document.getElementById('loginError').textContent = '';
                }, 2000);
            }
        }, 150);
    }
}
function delPin() {
    pinEntry = pinEntry.slice(0, -1);
    updateDots();
    document.getElementById('loginError').textContent = '';
}
function updateDots() {
    for (let i = 0; i < 4; i++) {
        document.getElementById(`dot${i}`).classList.toggle('filled', i < pinEntry.length);
    }
}
function unlockApp() {
    authenticated = true;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.add('show');
    loadData();
    const today = new Date();
    viewYear  = today.getFullYear();
    viewMonth = today.getMonth();
    render();
}
function logout() {
    authenticated = false;
    pinEntry = '';
    updateDots();
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.remove('show');
}

// ── DATA ───────────────────────────────────────────
function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try { blocked = JSON.parse(saved); } catch(e) { blocked = {}; }
    }
    // Ensure all rooms exist
    ROOMS_CONFIG.forEach(r => { if (!blocked[r.id]) blocked[r.id] = []; });
}
function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(blocked));
    const now = new Date();
    document.getElementById('lastSaved').textContent =
        `Saved ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    showToast('Changes saved');
}

// ── TOGGLE ─────────────────────────────────────────
function toggleDate(roomId, ds) {
    const arr = blocked[roomId];
    const idx = arr.indexOf(ds);
    if (idx === -1) arr.push(ds);
    else arr.splice(idx, 1);
    saveData();
    renderStats();
    renderRoom(roomId);
}
function clearRoomMonth(roomId) {
    const y = viewYear, m = viewMonth;
    blocked[roomId] = blocked[roomId].filter(ds => {
        const d = new Date(ds);
        return !(d.getFullYear() === y && d.getMonth() === m);
    });
    saveData();
    renderStats();
    renderRoom(roomId);
}
function blockRoomMonth(roomId) {
    const y = viewYear, m = viewMonth;
    const days = new Date(y, m+1, 0).getDate();
    const today = new Date(); today.setHours(0,0,0,0);
    for (let d = 1; d <= days; d++) {
        const date = new Date(y, m, d);
        if (date < today) continue;
        const ds = fmt(date);
        if (!blocked[roomId].includes(ds)) blocked[roomId].push(ds);
    }
    saveData();
    renderStats();
    renderRoom(roomId);
}
function clearAll() {
    if (!confirm('Clear ALL blocked dates for ALL rooms this month?')) return;
    ROOMS_CONFIG.forEach(r => clearRoomMonth(r.id));
}

// ── RENDER ─────────────────────────────────────────
function render() {
    document.getElementById('monthLabel').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
    renderStats();
    const grid = document.getElementById('roomsGrid');
    grid.innerHTML = '';
    ROOMS_CONFIG.forEach(room => {
        const panel = document.createElement('div');
        panel.className = 'room-panel';
        panel.id = `panel-${room.id}`;
        grid.appendChild(panel);
        renderRoom(room.id);
    });
}
function renderRoom(roomId) {
    const room   = ROOMS_CONFIG.find(r => r.id === roomId);
    const panel  = document.getElementById(`panel-${roomId}`);
    const blockedDates = blocked[roomId] || [];
    const monthBlocked = blockedDates.filter(ds => {
        const d = new Date(ds);
        return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
    }).length;

    panel.innerHTML = `
        <div class="room-panel-header">
            <div>
                <div class="room-panel-name">${room.name}</div>
                <div class="room-blocked-count">${monthBlocked} day${monthBlocked!==1?'s':''} blocked this month · €${room.price}/night</div>
            </div>
            <div class="room-panel-badge">${room.label}</div>
        </div>
        <div class="cal-wrap" id="cal-${roomId}">${buildCalHTML(roomId)}</div>
        <div class="room-actions">
            <button class="action-btn" onclick="blockRoomMonth('${roomId}')">Block month</button>
            <button class="action-btn danger" onclick="clearRoomMonth('${roomId}')">Clear month</button>
        </div>
    `;
}
function buildCalHTML(roomId) {
    const today = new Date(); today.setHours(0,0,0,0);
    const y = viewYear, m = viewMonth;
    const daysInMo = new Date(y, m+1, 0).getDate();
    const firstDow = (new Date(y, m, 1).getDay() + 6) % 7; // Mon-start
    const blockedArr = blocked[roomId] || [];

    let html = '<div class="cal-weekdays">';
    WEEKDAYS.forEach(d => { html += `<div class="cal-wd">${d}</div>`; });
    html += '</div><div class="cal-days-grid">';

    for (let i = 0; i < firstDow; i++) html += '<div class="cal-cell empty"></div>';

    for (let d = 1; d <= daysInMo; d++) {
        const date = new Date(y, m, d); date.setHours(0,0,0,0);
        const ds   = fmt(date);
        const isPast    = date < today;
        const isToday   = date.getTime() === today.getTime();
        const isBlocked = blockedArr.includes(ds);

        let cls = 'cal-cell';
        if (isPast)    cls += ' past';
        if (isToday)   cls += ' today';
        if (isBlocked) cls += ' blocked';

        const onclick = isPast ? '' : `onclick="toggleDate('${roomId}','${ds}')"`;
        html += `<div class="${cls}" ${onclick}><div class="cal-num">${d}</div></div>`;
    }
    html += '</div>';
    return html;
}
function renderStats() {
    const today = new Date(); today.setHours(0,0,0,0);
    const y = viewYear, m = viewMonth;
    const daysInMo = new Date(y, m+1, 0).getDate();
    let futureDays = 0;
    for (let d = 1; d <= daysInMo; d++) {
        const date = new Date(y, m, d); date.setHours(0,0,0,0);
        if (date >= today) futureDays++;
    }
    const totalSlots = ROOMS_CONFIG.length * futureDays;
    let totalBlocked = 0;
    ROOMS_CONFIG.forEach(room => {
        totalBlocked += (blocked[room.id] || []).filter(ds => {
            const d = new Date(ds);
            return d.getFullYear() === y && d.getMonth() === m && new Date(ds) >= today;
        }).length;
    });
    const available = totalSlots - totalBlocked;
    const pct = totalSlots > 0 ? Math.round((totalBlocked/totalSlots)*100) : 0;
    document.getElementById('statsBar').innerHTML = `
        <div class="stat-chip"><div class="stat-dot" style="background:var(--gold);"></div><span class="stat-num">${available}</span>&nbsp;room-nights available</div>
        <div class="stat-chip"><div class="stat-dot" style="background:var(--red);"></div><span class="stat-num">${totalBlocked}</span>&nbsp;room-nights blocked</div>
        <div class="stat-chip"><div class="stat-dot" style="background:var(--muted);"></div><span class="stat-num">${pct}%</span>&nbsp;occupancy blocked</div>
        <div class="stat-chip" style="cursor:pointer;border-color:var(--red);color:var(--red);" onclick="clearAll()">Clear all rooms this month</div>
    `;
}

function changeMonth(delta) {
    viewMonth += delta;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth <  0) { viewMonth = 11; viewYear--; }
    render();
}

// ── TOAST ──────────────────────────────────────────
let toastTimer;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── UTILS ──────────────────────────────────────────
function fmt(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

// ── KEYBOARD SUPPORT ───────────────────────────────
document.addEventListener('keydown', e => {
    if (!authenticated) {
        if (e.key >= '0' && e.key <= '9') enterPin(e.key);
        if (e.key === 'Backspace') delPin();
    }
});
</script>
</body>
</html>
