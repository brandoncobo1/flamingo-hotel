<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reserve | Flamingo Hotel Vlorë</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark:   #0A0A0A;
            --gold:   #F78FAD;
            --gold2:  #6B6B2E;
            --white:  #FAFAF7;
            --bg:     #F4F1EB;
            --muted:  #8C8880;
            --border: #DDD9D0;
            --font-d: 'Cormorant Garamond', serif;
            --font-p: 'Playfair Display', serif;
            --font-s: 'Inter', sans-serif;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overflow:hidden; background:var(--white); font-family:var(--font-s); color:var(--dark); -webkit-font-smoothing:antialiased; }

        .shell { height:100vh; height:100dvh; display:flex; flex-direction:column; }

        /* TOP BAR */
        .topbar {
            flex-shrink:0; display:flex; align-items:center;
            justify-content:space-between; padding:18px 28px;
            border-bottom:1px solid var(--border); background:var(--white);
            position:relative; z-index:10;
        }
        .topbar-title {
            position:absolute; left:50%; transform:translateX(-50%);
            font-family:var(--font-d); font-size:14px; letter-spacing:0.18em;
            text-transform:uppercase; font-weight:400; font-style:italic;
            white-space:nowrap; color:var(--dark);
        }
        .topbar-btn {
            background:none; border:none; cursor:pointer; font-size:22px;
            color:var(--dark); width:32px; height:32px; display:flex;
            align-items:center; justify-content:center; opacity:0.45;
            transition:opacity 0.2s; text-decoration:none;
        }
        .topbar-btn:hover { opacity:1; }
        .topbar-btn.hidden { visibility:hidden; }
        .topbar-right { display:flex; align-items:center; gap:6px; }
        .lang-sw { display:flex; align-items:center; gap:1px; }
        .lang-btn { background:none; border:none; cursor:pointer; font-family:var(--font-s); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; font-weight:500; color:var(--dark); opacity:0.35; transition:opacity 0.2s; padding:3px 4px; }
        .lang-btn:hover { opacity:0.7; }
        .lang-btn.active { opacity:1; border-bottom:1px solid var(--dark); }
        @media(max-width:768px){ .lang-sw, .lang-div { display:none !important; } }
        .lang-div { font-size:8px; opacity:0.2; color:var(--dark); }

        /* Gold accent line under topbar */
        .topbar-line {
            flex-shrink:0; height:2px;
            background:linear-gradient(to right, var(--gold), var(--gold2), transparent);
        }

        /* STEPS */
        .steps-wrap { flex:1; overflow:hidden; position:relative; }
        .step { position:absolute; inset:0; overflow-y:auto; background:var(--white); transition:transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease; }
        .step.active { transform:translateX(0);     opacity:1;  pointer-events:all; }
        .step.prev   { transform:translateX(-100%); opacity:0;  pointer-events:none; }
        .step.next   { transform:translateX(100%);  opacity:0;  pointer-events:none; }

        /* BOTTOM BAR */
        .bottombar { flex-shrink:0; padding:16px 28px 20px; border-top:1px solid var(--border); background:var(--white); }
        .next-btn {
            display:block; width:100%; padding:16px;
            background:var(--gold); color:var(--white); border:none;
            font-family:var(--font-d); font-size:14px; letter-spacing:0.2em;
            text-transform:uppercase; font-style:italic; font-weight:400;
            cursor:pointer; transition:background 0.3s, color 0.3s;
        }
        .next-btn:disabled { opacity:0.25; cursor:not-allowed; }
        .next-btn:not(:disabled):hover { background:var(--gold2); color:var(--white); }

        /* ── STEP 1: CALENDAR ─────────────────────── */
        .cal-legend {
            display:flex; flex-wrap:wrap; gap:18px;
            padding:22px 28px 0; font-size:11px; letter-spacing:0.1em;
            text-transform:uppercase; color:var(--muted);
        }
        .leg-item { display:flex; align-items:center; gap:8px; }
        .leg-dot { width:16px; height:16px; border-radius:50%; flex-shrink:0; }

        .cal-scroll { padding:0 28px 40px; }
        .cal-month-block { margin-top:36px; }
        .cal-month-name {
            font-family:var(--font-d); font-size:26px; font-style:italic;
            font-weight:400; margin-bottom:22px; color:var(--dark);
        }
        .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:8px; }
        .cal-wd { text-align:center; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); padding-bottom:8px; }
        .cal-days-grid { display:grid; grid-template-columns:repeat(7,1fr); row-gap:4px; }

        .cal-cell { display:flex; align-items:center; justify-content:center; height:50px; position:relative; cursor:pointer; user-select:none; -webkit-user-select:none; }
        .cal-cell.empty { cursor:default; }
        .cal-cell.past  { cursor:not-allowed; }
        .cal-num {
            width:44px; height:44px; display:flex; align-items:center; justify-content:center;
            font-family:var(--font-s); font-size:15px; font-weight:300; border-radius:50%;
            position:relative; z-index:2; transition:background 0.15s, color 0.15s;
        }
        .cal-cell.past .cal-num { color:#CCC8C0; }
        .cal-cell.blocked .cal-num { color:#CCC8C0; text-decoration:line-through; cursor:not-allowed; }
        .cal-cell::before {
            content:''; position:absolute; top:50%; transform:translateY(-50%);
            height:44px; left:0; right:0; background:transparent; z-index:1; transition:background 0.15s;
        }
        .cal-cell.in-range::before    { background:#F5EDD5; }
        .cal-cell.range-start::before { background:#F5EDD5; left:50%; }
        .cal-cell.range-end::before   { background:#F5EDD5; right:50%; }
        .cal-cell.range-start .cal-num,
        .cal-cell.range-end .cal-num  { background:var(--gold); color:var(--white); font-weight:400; }
        .cal-cell:not(.past):not(.blocked):not(.range-start):not(.range-end):hover .cal-num { background:var(--bg); }
        .cal-cell.today:not(.range-start):not(.range-end) .cal-num::after {
            content:''; position:absolute; bottom:5px; left:50%; transform:translateX(-50%);
            width:4px; height:4px; border-radius:50%; background:var(--gold);
        }

        /* ── STEP 2: GUESTS ───────────────────────── */
        .guests-wrap { padding:48px 28px; max-width:480px; margin:0 auto; }
        .guests-title {
            font-family:var(--font-d); font-size:42px; font-style:italic;
            font-weight:400; margin-bottom:8px; color:var(--dark);
        }
        .guests-sub { font-size:13px; color:var(--muted); margin-bottom:44px; line-height:1.6; }
        .guest-row { display:flex; justify-content:space-between; align-items:center; padding:24px 0; border-bottom:1px solid var(--border); }
        .guest-row:first-of-type { border-top:1px solid var(--border); }
        .guest-label-main { font-family:var(--font-d); font-size:20px; font-style:italic; font-weight:400; }
        .guest-label-sub  { font-size:11px; color:var(--muted); margin-top:3px; letter-spacing:0.06em; }
        .guest-counter { display:flex; align-items:center; gap:22px; }
        .ctr-btn {
            width:38px; height:38px; border-radius:50%;
            border:1px solid var(--border); background:none; cursor:pointer;
            font-size:20px; color:var(--dark); display:flex;
            align-items:center; justify-content:center; transition:border-color 0.2s, background 0.2s;
        }
        .ctr-btn:hover:not(:disabled) { border-color:var(--gold); background:var(--bg); }
        .ctr-btn:disabled { opacity:0.2; cursor:not-allowed; }
        .ctr-val { font-family:var(--font-d); font-size:32px; font-weight:400; min-width:24px; text-align:center; color:var(--dark); }

        /* ── STEP 3: SUMMARY ──────────────────────── */
        .summary-wrap { padding:40px 28px; max-width:520px; margin:0 auto; }
        .summary-title { font-family:var(--font-d); font-size:42px; font-style:italic; font-weight:400; margin-bottom:36px; }
        .sum-card { border:1px solid var(--border); border-radius:2px; overflow:hidden; margin-bottom:14px; }
        .sum-card-inner { padding:22px; }
        .sum-label { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; font-weight:500; }
        .sum-value { font-family:var(--font-d); font-size:18px; font-weight:400; letter-spacing:0.04em; }
        .sum-edit { float:right; background:none; border:none; cursor:pointer; color:var(--muted); font-size:16px; margin-top:2px; transition:color 0.2s; }
        .sum-edit:hover { color:var(--gold); }

        /* ── STEP 4: ROOMS ────────────────────────── */
        .rooms-wrap { padding:28px 28px 50px; }
        .rooms-header { margin-bottom:28px; }
        .rooms-title { font-family:var(--font-d); font-size:36px; font-style:italic; font-weight:400; margin-bottom:6px; }
        .rooms-sub { font-size:12px; color:var(--muted); letter-spacing:0.04em; }
        #roomsList { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        @media(max-width:768px){ #roomsList { grid-template-columns:1fr; } }
        .room-card { border:1px solid var(--border); overflow:hidden; }
        .room-card-img { width:100%; height:230px; object-fit:cover; display:block; transition:transform 0.7s ease; }
        .room-card:hover .room-card-img { transform:scale(1.03); }
        .room-card-body { padding:22px; }
        .room-card-label { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; font-weight:500; }
        .room-card-name { font-family:var(--font-d); font-size:26px; font-style:italic; font-weight:400; margin-bottom:8px; }
        .room-card-desc { font-size:13px; color:var(--muted); margin-bottom:20px; line-height:1.7; }
        .room-card-footer { display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid var(--border); padding-top:18px; }
        .room-price-per { font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
        .room-price-num { font-family:var(--font-d); font-size:32px; font-style:italic; font-weight:400; color:var(--dark); }
        .room-price-total { font-size:11px; color:var(--muted); margin-top:3px; }
        .room-select-btn {
            background:none; color:var(--dark); border:1px solid var(--dark);
            padding:12px 26px; font-family:var(--font-d); font-size:13px;
            font-style:italic; letter-spacing:0.1em; cursor:pointer;
            transition:background 0.3s, color 0.3s, border-color 0.3s;
        }
        .room-select-btn:hover { background:var(--gold); color:var(--white); border-color:var(--gold); }
        .room-unavailable { opacity:0.35; pointer-events:none; }
        .room-unavail-badge {
            font-size:10px; letter-spacing:0.12em; text-transform:uppercase;
            color:var(--muted); border:1px solid var(--border); padding:8px 16px;
            font-family:var(--font-d); font-style:italic;
        }

        /* ── SUCCESS ──────────────────────────────── */
        .success-screen {
            display:none; position:fixed; inset:0; background:var(--bg); z-index:999;
            flex-direction:column; align-items:center; justify-content:center;
            text-align:center; padding:40px 28px;
        }
        .success-screen.show { display:flex; }
        .success-mark { font-size:36px; color:var(--gold); margin-bottom:28px; }
        .success-h { font-family:var(--font-d); font-size:52px; font-style:italic; font-weight:400; margin-bottom:16px; }
        .success-p { font-size:14px; color:var(--muted); max-width:340px; line-height:1.8; margin-bottom:40px; }
        .success-back {
            font-family:var(--font-d); font-size:14px; font-style:italic;
            letter-spacing:0.1em; text-decoration:none; color:var(--dark);
            border-bottom:1px solid var(--gold); padding-bottom:3px;
        }
    </style>
</head>

<div class="success-screen" id="successScreen">
    <div class="success-mark">✦</div>
    <h2 class="success-h" id="successTitle"></h2>

    <a href="index.html" class="success-back" id="successBack"></a>
</div>

<div class="shell">

    <div class="steps-wrap">

        </div>

        <!-- STEP 2: GUESTS -->
        <div class="step next" id="step2">
            <div class="guests-wrap">
                <h2 class="guests-title" id="guestsTitle"></h2>
                <p class="guests-sub" id="guestsSub"></p>

                        <span class="ctr-val" id="adultsVal">1</span>
                        <button class="ctr-btn" onclick="changeGuests('adults',1)">+</button>
                    </div>
                </div>
                <div class="guest-row">
                    <div><div class="guest-label-main" id="childrenLabel"></div><div class="guest-label-sub" id="childrenAge"></div></div>
                    <div class="guest-counter">

                        <span class="ctr-val" id="childrenVal">0</span>
                        <button class="ctr-btn" onclick="changeGuests('children',1)">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- STEP 3: SUMMARY -->
        <div class="step next" id="step3">
            <div class="summary-wrap">
                <h2 class="summary-title" id="summaryTitle"></h2>
                <div class="sum-card"><div class="sum-card-inner"><div class="sum-label" id="sumDestLabel"></div><div class="sum-value" id="sumDestVal"></div></div></div>
                <div class="sum-card"><div class="sum-card-inner"><div class="sum-label" id="sumDatesLabel"></div><div class="sum-value" id="sumDates">—</div><button class="sum-edit" onclick="jumpTo(1)">&#9998;</button></div></div>
                <div class="sum-card"><div class="sum-card-inner"><div class="sum-label" id="sumGuestsLabel"></div><div class="sum-value" id="sumGuests">—</div><button class="sum-edit" onclick="jumpTo(2)">&#9998;</button></div></div>
            </div>
        </div>

        <!-- STEP 4: ROOMS -->
        <div class="step next" id="step4">
            <div class="rooms-wrap">
                <div class="rooms-header">
                    <h2 class="rooms-title" id="roomsTitle"></h2>
                    <p class="rooms-sub" id="roomsSub"></p>
                </div>
                <div id="roomsList"></div>
            </div>
        </div>

    </div>

    <div class="bottombar">
        <button class="next-btn" id="nextBtn" onclick="goNext()" disabled></button>
    </div>
</div>

};

const ROOMS = [
    { id:"junior-suite",   tKey:"r1", price:199, img:"images/r1-hero.jpg", maxGuests:2 },
    { id:"superior-double",tKey:"r2", price:126, img:"images/r2-hero.jpg", maxGuests:2 },
    { id:"luxury-triple",  tKey:"r3", price:140, img:"images/r3-hero.jpg", maxGuests:3 },

];

let lang = localStorage.getItem('lang') || 'en';
if (!T[lang]) lang = 'en';
let currentStep=1, checkIn=null, checkOut=null, selecting='in', adults=1, children=0;

function applyLang() {
    const t = T[lang];
    document.getElementById('legSelected').textContent    = t.legSelected;
    document.getElementById('legYourStay').textContent    = t.legYourStay;
    document.getElementById('legUnavail').textContent     = t.legUnavail;
    document.getElementById('guestsTitle').textContent    = t.guestsTitle;
    document.getElementById('guestsSub').textContent      = t.guestsSub;
    document.getElementById('adultsLabel').textContent    = t.adultsLabel;
    document.getElementById('adultsAge').textContent      = t.adultsAge;
    document.getElementById('childrenLabel').textContent  = t.childLabel;
    document.getElementById('childrenAge').textContent    = t.childAge;
    document.getElementById('summaryTitle').textContent   = t.sumTitle;
    document.getElementById('sumDestLabel').textContent   = t.sumDest;
    document.getElementById('sumDestVal').textContent     = t.sumDestVal;
    document.getElementById('sumDatesLabel').textContent  = t.sumDates;
    document.getElementById('sumGuestsLabel').textContent = t.sumGuests;
    document.getElementById('roomsTitle').textContent     = t.roomsTitle;
    document.getElementById('successTitle').textContent   = t.successTitle;
    document.getElementById('successText').textContent    = t.successText;
    document.getElementById('successBack').textContent    = t.successBack;
    updateTopbar(); updateNextBtn();
}

function buildCalendars() {
    const t=T[lang], scroll=document.getElementById('calScroll');
    scroll.innerHTML='';
    const today=new Date(); today.setHours(0,0,0,0);
    const sy=today.getFullYear(), sm=today.getMonth();
    for(let m=0;m<13;m++){
        let y=sy,mo=sm+m;
        if(mo>11){y++;mo-=12;}
        const block=document.createElement('div'); block.className='cal-month-block';
        const title=document.createElement('div'); title.className='cal-month-name';
        title.textContent=`${t.months[mo]} ${y}`; block.appendChild(title);
        const wdRow=document.createElement('div'); wdRow.className='cal-weekdays';
        t.weekdays.forEach(d=>{const wd=document.createElement('div');wd.className='cal-wd';wd.textContent=d;wdRow.appendChild(wd);});
        block.appendChild(wdRow);
        const grid=document.createElement('div'); grid.className='cal-days-grid';
        const firstDow=(new Date(y,mo,1).getDay()+6)%7;
        const daysInMo=new Date(y,mo+1,0).getDate();
        for(let i=0;i<firstDow;i++){const e=document.createElement('div');e.className='cal-cell empty';grid.appendChild(e);}
        for(let d=1;d<=daysInMo;d++){
            const date=new Date(y,mo,d); date.setHours(0,0,0,0);
            const ds=fmt(date);
            const cell=document.createElement('div'); cell.className='cal-cell'; cell.dataset.date=ds;
            const num=document.createElement('div'); num.className='cal-num'; num.textContent=d; cell.appendChild(num);
            if(date<today)cell.classList.add('past');
            if(date.getTime()===today.getTime())cell.classList.add('today');
            cell.addEventListener('click',()=>onDayClick(cell,date,ds));
            grid.appendChild(cell);
        }
        block.appendChild(grid); scroll.appendChild(block);
    }
    refreshCalStyles();
}

function onDayClick(cell,date,ds){
    if(cell.classList.contains('past'))return;
    const allBlocked=Object.values(BLOCKED).every(a=>a.includes(ds));
    if(allBlocked)return;
    if(selecting==='in'){checkIn=date;checkOut=null;selecting='out';}
    else{ if(date<=checkIn){checkIn=date;checkOut=null;selecting='out';}else{checkOut=date;selecting='in';} }
    refreshCalStyles(); updateNextBtn();
}

function refreshCalStyles(){
    document.querySelectorAll('.cal-cell').forEach(cell=>{
        cell.classList.remove('range-start','range-end','in-range','blocked');
        const ds=cell.dataset.date; if(!ds)return;
        const date=new Date(ds);
        const isBlocked=Object.values(BLOCKED).every(a=>a.includes(ds));
        if(isBlocked&&!cell.classList.contains('past')){cell.classList.add('blocked');return;}
        if(!checkIn)return;
        const ci=fmt(checkIn),co=checkOut?fmt(checkOut):null;
        if(ci&&co){
            if(ds===ci)cell.classList.add('range-start');
            else if(ds===co)cell.classList.add('range-end');
            else if(date>checkIn&&date<checkOut)cell.classList.add('in-range');
        } else if(ds===ci)cell.classList.add('range-start');
    });
}

function changeGuests(type,delta){
    if(type==='adults'){adults=Math.max(1,adults+delta);document.getElementById('adultsVal').textContent=adults;document.getElementById('adultsMinus').disabled=adults<=1;}
    else{children=Math.max(0,children+delta);document.getElementById('childrenVal').textContent=children;document.getElementById('childrenMinus').disabled=children<=0;}
}

function goNext(){
    if(currentStep===1&&(!checkIn||!checkOut))return;
    if(currentStep===3)buildRooms();
    const from=currentStep; currentStep++;
    transitionSteps(from,currentStep); updateTopbar(); updateNextBtn();
    if(currentStep===3)fillSummary();
}
function goBack(){
    if(currentStep<=1)return;
    const from=currentStep; currentStep--;
    transitionSteps(from,currentStep,true); updateTopbar(); updateNextBtn();
}
function jumpTo(step){
    const from=currentStep; currentStep=step;
    transitionSteps(from,currentStep,step<from); updateTopbar(); updateNextBtn();
}
function transitionSteps(from,to,back){
    const f=document.getElementById(`step${from}`),t=document.getElementById(`step${to}`);
    f.classList.remove('active'); f.classList.add(back?'next':'prev');
    t.classList.remove('prev','next'); t.classList.add('active'); t.scrollTop=0;
}
function updateTopbar(){
    const t=T[lang];
    document.getElementById('topbarTitle').textContent=t.steps[currentStep]||'';
    document.getElementById('backBtn').classList.toggle('hidden',currentStep===1);
}
function updateNextBtn(){
    const t=T[lang],btn=document.getElementById('nextBtn');
    btn.style.display='';
    if(currentStep===1){btn.disabled=!(checkIn&&checkOut);btn.textContent=t.next;}
    else if(currentStep===2){btn.disabled=false;btn.textContent=t.next;}
    else if(currentStep===3){btn.disabled=false;btn.textContent=t.checkRates;}
    else if(currentStep===4){btn.style.display='none';}
}
function fillSummary(){
    const t=T[lang];
    const nights=Math.round((checkOut-checkIn)/86400000);
    const locale=lang==='sq'?'sq-AL':lang==='it'?'it-IT':'en-GB';
    const ci=checkIn.toLocaleDateString(locale,{day:'numeric',month:'short'});
    const co=checkOut.toLocaleDateString(locale,{day:'numeric',month:'short',year:'numeric'});
    document.getElementById('sumDates').textContent=`${ci.toUpperCase()} — ${co.toUpperCase()}  ·  ${nights} ${nights!==1?t.nights:t.night}`;
    let g=`${adults} ${t.adultsLabel}`;
    if(children>0)g+=` + ${children} ${t.childLabel}`;
    document.getElementById('sumGuests').textContent=g;
}
function buildRooms(){
    const t=T[lang];
    const nights=Math.round((checkOut-checkIn)/86400000);
    const totalGuests=adults+children;
    const list=document.getElementById('roomsList'); list.innerHTML='';
    const locale=lang==='sq'?'sq-AL':lang==='it'?'it-IT':'en-GB';
    const ci=checkIn.toLocaleDateString(locale,{day:'numeric',month:'short'});
    const co=checkOut.toLocaleDateString(locale,{day:'numeric',month:'short'});
    document.getElementById('roomsSub').textContent=`${ci} — ${co}  ·  ${nights} ${nights!==1?t.nights:t.night}  ·  ${totalGuests} ${totalGuests!==1?t.guests:t.guest}`;
    ROOMS.forEach(room=>{
        const blocked=BLOCKED[room.id]||[];
        let unavail=false;
        let d=new Date(checkIn);
        while(d<checkOut){if(blocked.includes(fmt(d))){unavail=true;break;}d.setDate(d.getDate()+1);}
        const overCap=totalGuests>room.maxGuests;
        const isUnavail=unavail||overCap;
        const total=nights*room.price;
        const card=document.createElement('div'); card.className='room-card'+(isUnavail?' room-unavailable':'');
        card.innerHTML=`
            <img class="room-card-img" src="${room.img}" alt="${t[room.tKey+'n']}" loading="lazy">
            <div class="room-card-body">
                <div class="room-card-label">${t[room.tKey+'l']}</div>
                <div class="room-card-name">${t[room.tKey+'n']}</div>
                <div class="room-card-desc">${t[room.tKey+'d']}</div>
                <div class="room-card-footer">
                    <div>
                        <div class="room-price-per">${t.avgNight}</div>
                        <div class="room-price-num">€${room.price}</div>
                        <div class="room-price-total">€${total} ${t.totalFor} ${nights} ${nights!==1?t.nights:t.night}</div>
                    </div>
                    ${isUnavail
                        ?`<span class="room-unavail-badge">${overCap?t.overCap:t.unavail}</span>`
                        :`<button class="room-select-btn" onclick="selectRoom()">${t.select}</button>`
                    }
                </div>
            </div>`;
        list.appendChild(card);
    });
    document.getElementById('nextBtn').style.display='none';
}
function selectRoom(){ document.getElementById('successScreen').classList.add('show'); }
function fmt(date){ return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }
function setLang(l){lang=l;localStorage.setItem('lang',l);document.querySelectorAll('.lang-btn').forEach(b=>{const m={en:'ENG',sq:'ALB',it:'ITA'};b.classList.toggle('active',b.textContent.trim()===m[l]);});applyLang();}
setLang(lang);
buildCalendars();
</script>
</body>
</html>
